---
# Playbook für System-Basiskonfiguration
- name: Configure base system
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name:
          - build-essential
          - cmake
          - git
          - curl
          - wget
          - vim
          - htop
          - neofetch
        state: present
        update_cache: yes

    - name: Create necessary directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/llm
        - /opt/models
        - /opt/scripts

    - name: Configure system limits
      community.general.sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes