---
# LLM Setup Role
- name: Setup LLM environment
  block:
    - name: Create LLM directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: plaximo
        group: plaximo
        mode: '0755'
      loop:
        - "{{ ansible_env.HOME }}/llm-venv"
        - "{{ ansible_env.HOME }}/llama.cpp"
        - "{{ ansible_env.HOME }}/unsloth"

    - name: Install Python packages in venv
      ansible.builtin.pip:
        name:
          - huggingface_hub
          - httpx
          - typer
          - rich
          - tqdm
        virtualenv: "{{ ansible_env.HOME }}/llm-venv"
        state: present

    - name: Clone llama.cpp if not exists
      ansible.builtin.git:
        repo: https://github.com/ggerganov/llama.cpp.git
        dest: "{{ ansible_env.HOME }}/llama.cpp"
        update: yes
        force: no

    - name: Build llama.cpp
      ansible.builtin.shell: |
        cd {{ ansible_env.HOME }}/llama.cpp
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
      creates: "{{ ansible_env.HOME }}/llama.cpp/build/bin/llama-cli"
      become: yes
      become_user: plaximo